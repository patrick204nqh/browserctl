name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Push to RubyGems
    runs-on: ubuntu-latest
    environment: rubygems-release
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build gem
        run: gem build browserctl.gemspec
      - name: Push to RubyGems
        run: gem push browserctl-*.gem
        env:
          GEM_HOST_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
