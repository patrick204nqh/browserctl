name: Update Demo Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - "demo/**"

concurrency:
  group: assets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assets:
    name: Assets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: ./.github/actions/setup-ruby

      - name: Install VHS
        run: |
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://repo.charm.sh/apt/gpg.key \
            | sudo gpg --dearmor -o /etc/apt/keyrings/charm.gpg
          echo "deb [signed-by=/etc/apt/keyrings/charm.gpg] https://repo.charm.sh/apt/ * *" \
            | sudo tee /etc/apt/sources.list.d/charm.list
          sudo apt-get update -q
          sudo apt-get install -y vhs ttyd ffmpeg fonts-firacode

      - name: Capture screenshots
        run: bundle exec rake demo:screenshots

      - name: Record browser GIF
        run: bundle exec rake demo:browser_gif

      - name: Record terminal GIF
        run: bundle exec rake demo:terminal

      - name: Open or update assets PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          APP_SLUG="${{ steps.app-token.outputs.app-slug }}"
          APP_ID="${{ secrets.APP_ID }}"
          git config user.name "${APP_SLUG}[bot]"
          git config user.email "${APP_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
          git add docs/assets/
          if git diff --staged --quiet; then
            echo "No asset changes — skipping PR."
            exit 0
          fi
          BRANCH="chore/update-demo-assets"
          EXISTING_PR=$(gh pr list --head "$BRANCH" --base main --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            git fetch origin "$BRANCH" || true
            git checkout -B "$BRANCH" origin/"$BRANCH" 2>/dev/null || git checkout -b "$BRANCH"
            git add docs/assets/
            git commit -m "chore: update demo assets"
            git push origin "$BRANCH" --force-with-lease
            echo "Updated existing PR #${EXISTING_PR}."
          else
            git checkout -b "$BRANCH"
            git commit -m "chore: update demo assets"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: update demo assets" \
              --body "Automated update of demo screenshots and GIFs." \
              --base main \
              --head "$BRANCH"
          fi
