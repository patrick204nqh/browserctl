name: Update Screenshots

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/the_internet/**"

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-ruby

      - name: Start daemon
        run: |
          bundle exec browserd &
          until bundle exec browserctl ping 2>/dev/null; do sleep 0.5; done

      - name: Run smoke tests
        run: |
          bundle exec browserctl run examples/the_internet/login.rb             --screenshot_path docs/screenshots/the_internet_login.png
          bundle exec browserctl run examples/the_internet/checkboxes.rb        --screenshot_path docs/screenshots/the_internet_checkboxes.png
          bundle exec browserctl run examples/the_internet/dropdown.rb          --screenshot_path docs/screenshots/the_internet_dropdown.png
          bundle exec browserctl run examples/the_internet/dynamic_loading.rb   --screenshot_path docs/screenshots/the_internet_dynamic_loading.png
          bundle exec browserctl run examples/the_internet/add_remove_elements.rb --screenshot_path docs/screenshots/the_internet_add_remove_elements.png

      - name: Stop daemon
        if: always()
        run: bundle exec browserctl shutdown || true

      - name: Commit screenshots
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/screenshots/
          git diff --staged --quiet || git commit -m "chore: update smoke test screenshots [skip ci]"
          git push
