<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="120" height="120" role="img" aria-label="browserctl logo">
  <!-- Outer rim -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#6CABDD" stroke-width="4"/>

  <!-- 8 spokes (from hub edge r=12 to just inside rim r=40) -->
  <!-- 0° -->
  <line x1="62" y1="50" x2="90" y2="50" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 45° -->
  <line x1="58.49" y1="58.49" x2="78.28" y2="78.28" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 90° -->
  <line x1="50" y1="62" x2="50" y2="90" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 135° -->
  <line x1="41.51" y1="58.49" x2="21.72" y2="78.28" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 180° -->
  <line x1="38" y1="50" x2="10" y2="50" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 225° -->
  <line x1="41.51" y1="41.51" x2="21.72" y2="21.72" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 270° -->
  <line x1="50" y1="38" x2="50" y2="10" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>
  <!-- 315° -->
  <line x1="58.49" y1="41.51" x2="78.28" y2="21.72" stroke="#6CABDD" stroke-width="3" stroke-linecap="round"/>

  <!-- Handle knobs at r=46 -->
  <circle cx="96" cy="50"    r="4" fill="#6CABDD"/>
  <circle cx="82.53" cy="82.53" r="4" fill="#6CABDD"/>
  <circle cx="50"    cy="96"   r="4" fill="#6CABDD"/>
  <circle cx="17.47" cy="82.53" r="4" fill="#6CABDD"/>
  <circle cx="4"     cy="50"   r="4" fill="#6CABDD"/>
  <circle cx="17.47" cy="17.47" r="4" fill="#6CABDD"/>
  <circle cx="50"    cy="4"    r="4" fill="#6CABDD"/>
  <circle cx="82.53" cy="17.47" r="4" fill="#6CABDD"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="10" fill="#6CABDD"/>
  <circle cx="50" cy="50" r="5"  fill="#1C2E4A"/>
</svg>
